<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Patrick Porter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="site-page bg-light text-dark d-flex flex-column">
    <div id="navbar"></div>

    <main class="site-main d-flex align-items-center">
        <div class="container text-center">
            <section class="content-section d-flex align-items-center justify-content-center text-center">
                <div class="contact-card w-100 bg-white shadow rounded p-4 p-md-5">
                    <h2 class="display-6 fw-bold mb-4">Contact Me</h2>
                    <p class="content-copy text-muted mb-4">
                        If you have any questions, comments, or just want to say hello, feel free to reach out to me using the form below.
                        <br />
                        I look forward to hearing from you!
                    </p>

                    <form action="https://api.web3forms.com/submit" method="POST">
                        <input name="access_key" type="hidden" value="68060f41-d032-4f49-a134-07de628815cb" />

                        <p>
                            <input class="form-input" name="name" required type="text" placeholder="Your Name" />
                        </p>
                        <p>
                            <input class="form-input" name="email" required type="email" placeholder="Your Email" />
                        </p>
                        <p>
                            <textarea class="form-input" name="message" required placeholder="Your Message"></textarea>
                        </p>
                        <p>
                            <button type="submit" class="btn btn-secondary">Submit</button>
                        </p>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <footer class="site-footer text-center text-muted">
        © 2026 Patrick Porter
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <script src="js/navbar.js"></script>
</body>
</html>

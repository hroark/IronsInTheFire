<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Resume | Patrick Porter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit&display=swap" rel="stylesheet">

<body class="site-page bg-light text-dark d-flex flex-column">

  <main class="site-main d-flex align-items-center">
    <section class="content-section container text-center">
      <h1 class="mb-4">My Resume</h1>

      <embed
        class="resume-embed"
        src="../Patrick Porter Resume.pdf"

        <button type="button" class="btn btn-outline-primary" onclick="window.print()">
          Print Resume
        </button>
      </div>
    </section>
  </main>

  <footer class="site-footer text-center text-muted">
    © 2026 Patrick Porter
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  <script src="js/navbar.js"></script>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Resume | Patrick Porter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="site-page d-flex flex-column">

  <div id="navbar"></div>

  <main class="site-main d-flex align-items-center">
    <section class="page-shell">
      <div class="resume-panel text-center">
        <span class="eyebrow">Resume</span>
        <h1 class="section-title">Professional experience at a glance.</h1>
        <p class="section-copy mx-auto mb-4">
          Review the embedded resume below, print the PDF directly, open it in a dedicated viewer, or download a copy.
        </p>

        <div class="resume-frame">
          <embed
            id="resume-embed"
            class="resume-embed"
            src="../Patrick Porter Resume.pdf"
            type="application/pdf"
          />
        </div>

        <div id="resume-print-container" class="resume-print-container" aria-hidden="true"></div>

        <div class="no-print mt-4 d-flex flex-column flex-sm-row justify-content-center gap-3">
          <button type="button" id="print-resume-button" class="btn btn-brand-outline">
            Print Resume
          </button>
          <a href="../Patrick Porter Resume.pdf" target="_blank" rel="noopener noreferrer" class="btn btn-brand-soft">
            Open PDF
          </a>
          <a href="../Patrick Porter Resume.pdf" download="Patrick-Porter-Resume.pdf" class="btn btn-brand-soft">
            Download PDF
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer text-center text-muted">
    © 2026 Patrick Porter
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  <script src="js/navbar.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="js/resume.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Contact | Patrick Porter</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    </head>

    <body class="bg-gray-50 text-gray-800">
        <div id="navbar"></div>
        <div class="account-shell">
            <section class="account-card">
                <div class="w-full max-w-lg bg-white shadow-lg rounded-xl p-8">
                    <h2 class="text-3xl font-bold mb-6 text-center">Contact
                        Me</h2>
                    <form action="https://api.web3forms.com/submit"
                        method="POST">
                        <p><input name="access_key" type="hidden"
                                value="68060f41-d032-4f49-a134-07de628815cb" />
                            <input style="width: 200px;" name="name" required
                                type="text" placeholder="Your Name" /></p>
                        <p><br /> <input style="width: 200px;" name="email"
                                required type="email"
                                placeholder="Your Email" /></p>
                        <p><br /> <textarea style="width: 200px;" name="message"
                                required placeholder="Your Message"></textarea>
                            <p><br />
                                <button type="submit" class="btn btn-secondary"">Submit</button>
                        <div
                            style="position: relative !important; height: 0px !important; width: 0px !important; display: initial !important; float: left !important;"
                            data-lastpass-icon-root>&nbsp;</div>
                        <div
                            style="position: relative !important; height: 0px !important; width: 0px !important; display: initial !important; float: left !important;"
                            data-lastpass-icon-root>&nbsp;</div>
                    </form></div>
            </section>
        </div>
        <script>
  document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();
    document.getElementById("successMessage").classList.remove("hidden");
    this.reset();
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
        <script src="js/navbar.js"></script> <!-- set to asynch -->
        <script src="js/main.js"></script>

</html>
